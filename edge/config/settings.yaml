optimize:
  enabled: true
  interval_minutes: 10
  timeout_seconds: 60
  inspired:
    enabled: true
    setpoint_change_weight: 8.0
    chw_change_scale: 1.0
    freq_change_scale: 5.0
    unmet_cooling_weight: 2.0
    plr_sweet_lo: 0.3
    plr_sweet_hi: 0.55
    plr_sweet_weight: 15.0
    load_forecast_enabled: true
    load_forecast_alpha: 0.35
    blackbox_baseline_enabled: false
  control_stability:
    enabled: true
    outdoor_slow_delta_c: 0.8
    load_sudden_delta_pct: 8.0
    power_sudden_delta_frac: 0.12
    power_sudden_delta_kw: 40.0
    chw_step_c: 0.5
    pump_step_hz: 2.0
    sudden_chw_step_c: 0.3
    sudden_pump_step_hz: 1.0
    low_load_pct: 35.0
    low_load_pump_step_hz: 1.5
    min_saving_frac: 0.01
    min_saving_kw_floor: 0.5
    pump_trim_saving_frac: 0.002
    pump_trim_saving_floor: 0.2
    low_load_extra_saving_kw: 8.0
    feedback_overstatement_gain: 0.5
    feedback_max_extra_frac: 0.03
batch_defaults:
  outdoor_temp: 30.0
  outdoor_humidity: 60.0
  indoor_temp: 27.0
  indoor_humidity: 55.0
  terminal_fan_power: 0.0
energy_model:
  eta_chiller: 0.5
  terminal_fan_default: 2.0
  indoor_base_temp: 24.5
  indoor_gain: 25.0
  outdoor_indoor_coupling: 0.06
  outdoor_stress_ref: 29.0
  outdoor_load_coupling: 0.02
  min_running_chiller_power_ratio: 0.65
  max_component_power_rise_pct: 0.25
  enable_part_load_curve: true
  plr_eir_a: 0.338
  plr_eir_b: 0.284
  plr_eir_c: 0.378
  plr_eir_d: 0.0
  plr_min: 0.15
  plr_min_unl: 0.3
  enable_cap_fun_t: true
  cap_fun_t_chw: 0.01
  cap_fun_t_cw: 0.02
  cap_fun_t_min: 0.7
  cap_fun_t_max: 1.15
  tower_approach_water_k: 2.0
  design_chw_temp: 7.0
  # 设计冷却水进水（冷凝器进水），典型 29~32℃；勿取冷凝温度/出水
  design_cw_temp: 30.0
simulator:
  enabled: false
  interval_seconds: 30
mqtt:
  topic: ac/hospital/+/data
  topic_prefix: ac/hospital
  simulator_publisher: false
  simulator_device_id: device-001
  publish_interval_seconds: 5
constraints:
  chilled_water_temp_table:
    below_25: 14.0
    range_25_29: 12.0
    range_29_33: 10.0
    range_33_37: 9.0
    above_37: 8.0
  chilled_water_finetune:
    max_delta: 0.5
  # 室外分档泵频下限：贴近现场趋势（常 35~40Hz），避免 29~33℃ 档 40/42
  # 把实测 35Hz 基线抬高后制造假节能空间。
  outdoor_operating_floors:
    below_25:
      chilled_pump_freq: 32.0
      cooling_pump_freq: 32.0
      chiller_load_pct: 40.0
    range_25_29:
      chilled_pump_freq: 35.0
      cooling_pump_freq: 35.0
      chiller_load_pct: 50.0
    range_29_33:
      chilled_pump_freq: 36.0
      cooling_pump_freq: 36.0
      chiller_load_pct: 65.0
    range_33_37:
      chilled_pump_freq: 38.0
      cooling_pump_freq: 38.0
      chiller_load_pct: 75.0
    above_37:
      chilled_pump_freq: 40.0
      cooling_pump_freq: 40.0
      chiller_load_pct: 85.0
  comfort_margin:
    base_from_ceiling: 0.5
    base_from_floor: 0.3
    outdoor_ref_temp: 29.0
    outdoor_extra_per_degree: 0.1
    indoor_proximity_threshold: 0.3
    indoor_proximity_extra: 0.15
  pump_frequency:
    min: 25.0
    max: 50.0
  cooling_tower_fan_frequency:
    min: 20.0
    max: 45.0
  indoor_temp:
    min: 24.0
    max: 26.0
cleanup:
  runtime_data_keep_days: 30
  optimize_record_keep_days: 90
  alarm_log_keep_days: 180
  interval_hours: 6
sync:
  batch_size: 100
  max_retries: 5
  retry_backoff: 2
