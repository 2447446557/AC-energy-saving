optimize:
  enabled: false
  interval_minutes: 10
  timeout_seconds: 60
batch_defaults:
  outdoor_temp: 30.0
  outdoor_humidity: 60.0
  indoor_temp: 27.0
  indoor_humidity: 55.0
  terminal_fan_power: 0.0
energy_model:
  eta_chiller: 0.5
  terminal_fan_default: 2.0
  indoor_base_temp: 24.5
  indoor_gain: 25.0
  outdoor_indoor_coupling: 0.06
  outdoor_stress_ref: 29.0
  max_component_power_rise_pct: 0.15
simulator:
  enabled: false
  interval_seconds: 30
mqtt:
  topic: ac/hospital/+/data
  topic_prefix: ac/hospital
  simulator_publisher: false
  simulator_device_id: device-001
  publish_interval_seconds: 5
constraints:
  chilled_water_temp_table:
    below_25: 14.0
    range_25_29: 12.0
    range_29_33: 10.0
    range_33_37: 9.0
    above_37: 8.0
  chilled_water_finetune:
    max_delta: 0.5
  outdoor_operating_floors:
    below_25:
      chilled_pump_freq: 35.0
      cooling_pump_freq: 35.0
      chiller_load_pct: 40.0
    range_25_29:
      chilled_pump_freq: 38.0
      cooling_pump_freq: 38.0
      chiller_load_pct: 50.0
    range_29_33:
      chilled_pump_freq: 40.0
      cooling_pump_freq: 42.0
      chiller_load_pct: 65.0
    range_33_37:
      chilled_pump_freq: 40.0
      cooling_pump_freq: 45.0
      chiller_load_pct: 75.0
    above_37:
      chilled_pump_freq: 42.0
      cooling_pump_freq: 45.0
      chiller_load_pct: 85.0
  comfort_margin:
    base_from_ceiling: 0.5
    base_from_floor: 0.3
    outdoor_ref_temp: 29.0
    outdoor_extra_per_degree: 0.1
    indoor_proximity_threshold: 0.3
    indoor_proximity_extra: 0.15
  pump_frequency:
    min: 32.0
    max: 50.0
  cooling_tower_fan_frequency:
    min: 32.0
    max: 45.0
  indoor_temp:
    min: 24.0
    max: 26.0
cleanup:
  runtime_data_keep_days: 30
  optimize_record_keep_days: 90
  alarm_log_keep_days: 180
  interval_hours: 6
sync:
  batch_size: 100
  max_retries: 5
  retry_backoff: 2
