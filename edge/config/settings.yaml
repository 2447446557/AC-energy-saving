optimize:
  enabled: false
  interval_minutes: 10
  timeout_seconds: 60
batch_defaults:
  outdoor_temp: 30.0
  outdoor_humidity: 60.0
  indoor_temp: 27.0
  indoor_humidity: 55.0
  terminal_fan_power: 0.0
energy_model:
  eta_chiller: 0.5
  terminal_fan_default: 2.0
  indoor_base_temp: 24.5
  indoor_gain: 25.0
simulator:
  enabled: false
  interval_seconds: 30
mqtt:
  topic: ac/hospital/+/data
  topic_prefix: ac/hospital
  simulator_publisher: false
  simulator_device_id: device-001
  publish_interval_seconds: 5
constraints:
  chilled_water_temp:
    min: 10.0
    max: 10.0
  pump_frequency:
    min: 25.0
    max: 50.0
  cooling_tower_fan_frequency:
    min: 20.0
    max: 45.0
  indoor_temp:
    min: 24.0
    max: 26.0
cleanup:
  runtime_data_keep_days: 30
  optimize_record_keep_days: 90
  alarm_log_keep_days: 180
  interval_hours: 6
sync:
  batch_size: 100
  max_retries: 5
  retry_backoff: 2
